services:
  - type: web
    name: instarate
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RATE_LIMIT_PER_HOUR
        value: '5'
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    autoDeploy: true
